<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHALAH VOID 404 - Pairing</title>
    <style>
        body { background-color: #0a0a0a; color: #ff0000; font-family: 'Courier New', Courier, monospace; text-align: center; padding-top: 50px; }
        .container { border: 2px solid #ff0000; display: inline-block; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px #ff0000; }
        input { background: #1a1a1a; border: 1px solid #ff0000; color: white; padding: 10px; width: 250px; text-align: center; }
        button { background: #ff0000; color: black; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #codeDisplay { font-size: 30px; margin-top: 20px; letter-spacing: 5px; color: #fff; text-shadow: 0 0 10px #ff0000; }
        img { width: 150px; border-radius: 50%; border: 3px solid #ff0000; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://files.catbox.moe/90yqxb.png" alt="Logo">
        <h1>تشالاه فويد ٤٠٤</h1>
        <p>ENTER PHONE NUMBER WITH COUNTRY CODE (947xxxxxxxxx)</p>
        <input type="text" id="number" placeholder="94712345678"> <br>
        <button onclick="getPairingCode()">GET PAIRING CODE</button>
        <div id="codeDisplay"></div>
    </div>

    <script>
        async function getPairingCode() {
            const num = document.getElementById('number').value;
            const display = document.getElementById('codeDisplay');
            display.innerText = "GENERATING...";
            try {
                const response = await fetch(`/pair?number=${num}`);
                const data = await response.json();
                display.innerText = data.code || "ERROR";
            } catch (err) {
                display.innerText = "FAILED TO FETCH";
            }
        }
    </script>
</body>
</html>
